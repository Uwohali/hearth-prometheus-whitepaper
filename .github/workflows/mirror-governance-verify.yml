name: mirror-governance-verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate mirror governance, status and text safety
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          import json
          import re

          required_files = [
              "README.md",
              "MIRROR_SOURCE.json",
              "STATUS.json",
              "CLAIMS_BOUNDARY.md",
              "MIRROR_SYNC_POLICY.md",
              "MIRROR_REPRODUCIBILITY_AND_VERIFICATION.md",
              "VERIFICATION.md",
              "NO_GPG_SIGNATURES_YET.md",
              "RELEASE_NOTES.md",
              "REPRODUCIBLE_RELEASE.md",
              "SECURITY.md",
          ]

          for name in required_files:
              path = Path(name)
              if not path.is_file():
                  raise SystemExit(f"missing required file: {name}")
              path.read_text(encoding="utf-8")

          source = json.loads(
              Path("MIRROR_SOURCE.json").read_text(encoding="utf-8")
          )
          status = json.loads(
              Path("STATUS.json").read_text(encoding="utf-8")
          )

          expected_repositories = {
              "mirror_repository": "Uwohali/hearth-prometheus-whitepaper",
              "canonical_repository": "Permaculture-DAO/prometheus-canon",
              "release_repository": "Permaculture-DAO/prometheus-canonical-releases",
          }

          for key, expected in expected_repositories.items():
              if source.get(key) != expected:
                  raise SystemExit(
                      f"{key} must equal {expected!r}; "
                      f"received {source.get(key)!r}"
                  )

          allowed_statuses = {
              "STAGING_NOT_ACTIVATED",
              "VERIFIED_NOT_ACTIVATED",
              "ACTIVATED",
          }

          source_status = source.get("mirror_status")
          status_status = status.get("status")

          if source_status not in allowed_statuses:
              raise SystemExit(
                  f"invalid MIRROR_SOURCE status: {source_status}"
              )
          if status_status not in allowed_statuses:
              raise SystemExit(
                  f"invalid STATUS status: {status_status}"
              )
          if source_status != status_status:
              raise SystemExit(
                  "MIRROR_SOURCE.json and STATUS.json status mismatch"
              )

          boolean_fields = [
              "canonical_release_created_here",
              "signature_verified",
              "source_commit_verified",
              "byte_parity_verified",
              "staging_checksums_current",
              "scientific_validation_claimed",
              "production_admission_claimed",
              "legal_approval_claimed",
              "financial_verification_claimed",
              "pilot_completion_claimed",
              "institutional_admission_claimed",
          ]

          for field in boolean_fields:
              if type(status.get(field)) is not bool:
                  raise SystemExit(
                      f"STATUS.json field must be boolean: {field}"
                  )

          if status["canonical_release_created_here"] is not False:
              raise SystemExit(
                  "founder mirror cannot create canonical releases"
              )

          claim_flags = [
              "scientific_validation_claimed",
              "production_admission_claimed",
              "legal_approval_claimed",
              "financial_verification_claimed",
              "pilot_completion_claimed",
              "institutional_admission_claimed",
          ]

          true_claims = [field for field in claim_flags if status[field]]
          if true_claims:
              raise SystemExit(
                  f"unsupported mirror claim flags are true: {true_claims}"
              )

          def valid_hex(value, lengths):
              return (
                  isinstance(value, str)
                  and len(value) in lengths
                  and re.fullmatch(r"[0-9a-fA-F]+", value) is not None
              )

          def valid_utc(value):
              if not isinstance(value, str) or not value.endswith("Z"):
                  return False
              try:
                  datetime.fromisoformat(
                      value.replace("Z", "+00:00")
                  )
                  return True
              except ValueError:
                  return False

          optional_format_checks = {
              "source_commit": lambda value: valid_hex(value, {40, 64}),
              "release_manifest_sha256": lambda value: valid_hex(value, {64}),
              "signer_fingerprint": lambda value: valid_hex(value, {40, 64}),
              "verified_at_utc": valid_utc,
          }

          for field, validator in optional_format_checks.items():
              value = source.get(field)
              if value is not None and not validator(value):
                  raise SystemExit(f"invalid {field}")

          required_upstream = [
              "source_commit",
              "release_tag",
              "release_manifest_sha256",
              "signer_fingerprint",
              "provenance_reference",
              "verified_at_utc",
              "verified_by",
          ]

          verification_flags = [
              "signature_verified",
              "source_commit_verified",
              "byte_parity_verified",
          ]

          if source_status == "STAGING_NOT_ACTIVATED":
              true_flags = [
                  field for field in verification_flags
                  if status[field] is True
              ]
              if true_flags:
                  raise SystemExit(
                      "staging state cannot carry verified flags: "
                      + ", ".join(true_flags)
                  )
          else:
              missing = [
                  field for field in required_upstream
                  if not source.get(field)
              ]
              if missing:
                  raise SystemExit(
                      f"non-staging mirror has unresolved fields: {missing}"
                  )

              false_flags = [
                  field for field in verification_flags
                  if status[field] is not True
              ]
              if false_flags:
                  raise SystemExit(
                      "verified/activated state has false flags: "
                      + ", ".join(false_flags)
                  )

              if status["staging_checksums_current"] is not True:
                  raise SystemExit(
                      "non-staging state requires current mirror checksums"
                  )

              if not valid_utc(status.get("last_status_review_utc")):
                  raise SystemExit(
                      "non-staging state requires a valid status review time"
                  )

          # Hidden Unicode controls are prohibited in every governed text file.
          governed_extensions = {".md", ".json", ".yml", ".yaml", ".txt"}
          governed_files = [
              path for path in Path(".").rglob("*")
              if path.is_file()
              and ".git" not in path.parts
              and path.suffix.lower() in governed_extensions
          ]

          bidi = re.compile(
              "[\u200e\u200f\u202a-\u202e\u2066-\u2069]"
          )
          bidi_violations = []

          for path in governed_files:
              text = path.read_text(encoding="utf-8")
              for match in bidi.finditer(text):
                  bidi_violations.append(
                      f"{path}: prohibited bidi control "
                      f"U+{ord(match.group()):04X}"
                  )

          if bidi_violations:
              raise SystemExit("\n".join(bidi_violations))

          # Claim scanning excludes the boundary document because it records
          # prohibited terms intentionally.
          claim_scan_files = [
              Path("README.md"),
              Path("MIRROR_SYNC_POLICY.md"),
              Path("MIRROR_REPRODUCIBILITY_AND_VERIFICATION.md"),
              Path("VERIFICATION.md"),
              Path("NO_GPG_SIGNATURES_YET.md"),
              Path("RELEASE_NOTES.md"),
              Path("REPRODUCIBLE_RELEASE.md"),
              Path("SECURITY.md"),
          ]

          forbidden_claims = [
              "scientifically proven platform",
              "fully verified regenerative infrastructure",
              "production ready",
              "production-ready",
              "regulator approved",
              "regulatory approved",
              "institutionally admitted",
              "investment grade",
              "investment-grade",
              "canonical release activated",
              "independently replicated",
              "guaranteed ecological outcome",
              "guaranteed financial outcome",
              "guaranteed health outcome",
          ]

          claim_violations = []
          for path in claim_scan_files:
              lowered = path.read_text(encoding="utf-8").lower()
              for phrase in forbidden_claims:
                  if phrase in lowered:
                      claim_violations.append(
                          f"{path}: prohibited claim: {phrase}"
                      )

          boundary = Path("CLAIMS_BOUNDARY.md").read_text(
              encoding="utf-8"
          ).lower()

          required_boundary_terms = [
              "fully verified regenerative infrastructure",
              "scientifically proven platform",
              "production ready",
              "regulator approved",
              "institutionally admitted",
              "investment grade",
              "guaranteed ecological, financial or health outcome",
              "canonical release activated",
              "independently replicated",
          ]

          missing_boundary_terms = [
              phrase for phrase in required_boundary_terms
              if phrase not in boundary
          ]

          if missing_boundary_terms:
              claim_violations.append(
                  "CLAIMS_BOUNDARY.md missing terms: "
                  + ", ".join(missing_boundary_terms)
              )

          if claim_violations:
              raise SystemExit("\n".join(claim_violations))

          print(
              "mirror governance, state and text-safety verification passed"
          )
          PY

      - name: Enforce canonical artifact admission gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$PUSH_HEAD_SHA"

            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA")"
            fi
          fi

          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          if ! printf '%s\n' "$changed" | grep -q '^canonical/'; then
            echo "No canonical/ changes detected."
            exit 0
          fi

          test -f CANONICAL_ADMISSION.json

          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          import hashlib
          import json
          import re

          record = json.loads(
              Path("CANONICAL_ADMISSION.json").read_text(
                  encoding="utf-8"
              )
          )

          expected_repositories = {
              "canonical_repository": "Permaculture-DAO/prometheus-canon",
              "release_repository": "Permaculture-DAO/prometheus-canonical-releases",
          }

          for key, expected in expected_repositories.items():
              if record.get(key) != expected:
                  raise SystemExit(
                      f"{key} must equal {expected!r}"
                  )

          required = [
              "source_commit",
              "release_tag",
              "release_manifest_sha256",
              "signer_fingerprint",
              "provenance_reference",
              "admitted_by",
              "admitted_at_utc",
              "artifacts",
          ]

          missing = [field for field in required if not record.get(field)]
          if missing:
              raise SystemExit(
                  f"canonical admission record is incomplete: {missing}"
              )

          required_true = [
              "source_commit_verified",
              "byte_parity_verified",
              "signature_verified",
              "provenance_verified",
          ]

          false_assertions = [
              field for field in required_true
              if record.get(field) is not True
          ]

          if false_assertions:
              raise SystemExit(
                  "canonical admission assertions are not true: "
                  + ", ".join(false_assertions)
              )

          if not re.fullmatch(
              r"[0-9a-fA-F]{40}|[0-9a-fA-F]{64}",
              record["source_commit"],
          ):
              raise SystemExit("invalid admission source_commit")

          if not re.fullmatch(
              r"[0-9a-fA-F]{64}",
              record["release_manifest_sha256"],
          ):
              raise SystemExit("invalid release manifest SHA-256")

          if not re.fullmatch(
              r"[0-9a-fA-F]{40}|[0-9a-fA-F]{64}",
              record["signer_fingerprint"],
          ):
              raise SystemExit("invalid signer fingerprint")

          timestamp = record["admitted_at_utc"]
          if not isinstance(timestamp, str) or not timestamp.endswith("Z"):
              raise SystemExit("invalid admission timestamp")

          try:
              datetime.fromisoformat(
                  timestamp.replace("Z", "+00:00")
              )
          except ValueError as exc:
              raise SystemExit(
                  "invalid admission timestamp"
              ) from exc

          artifacts = record["artifacts"]
          if not isinstance(artifacts, list) or not artifacts:
              raise SystemExit("artifacts must be a non-empty list")

          manifest = {}
          for entry in artifacts:
              if not isinstance(entry, dict):
                  raise SystemExit("artifact entry must be an object")

              path = entry.get("path")
              expected_sha = entry.get("sha256")

              if (
                  not isinstance(path, str)
                  or not path.startswith("canonical/")
                  or ".." in Path(path).parts
              ):
                  raise SystemExit(
                      f"invalid canonical artifact path: {path!r}"
                  )

              if path in manifest:
                  raise SystemExit(
                      f"duplicate canonical artifact path: {path}"
                  )

              if (
                  not isinstance(expected_sha, str)
                  or not re.fullmatch(
                      r"[0-9a-fA-F]{64}", expected_sha
                  )
              ):
                  raise SystemExit(
                      f"invalid SHA-256 for canonical artifact: {path}"
                  )

              manifest[path] = expected_sha.lower()

          actual_paths = {
              path.as_posix()
              for path in Path("canonical").rglob("*")
              if path.is_file()
          }

          manifest_paths = set(manifest)

          missing_from_manifest = sorted(actual_paths - manifest_paths)
          absent_from_tree = sorted(manifest_paths - actual_paths)

          if missing_from_manifest or absent_from_tree:
              raise SystemExit(
                  "canonical manifest coverage mismatch; "
                  f"missing_from_manifest={missing_from_manifest}; "
                  f"absent_from_tree={absent_from_tree}"
              )

          mismatches = []
          for relative_path, expected_sha in manifest.items():
              actual_sha = hashlib.sha256(
                  Path(relative_path).read_bytes()
              ).hexdigest()

              if actual_sha != expected_sha:
                  mismatches.append(
                      f"{relative_path}: expected {expected_sha}, "
                      f"actual {actual_sha}"
                  )

          if mismatches:
              raise SystemExit("\n".join(mismatches))

          print(
              "canonical admission record and complete artifact manifest passed"
          )
          PY
