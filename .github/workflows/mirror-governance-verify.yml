name: mirror-governance-verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate mirror governance, status and text safety
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          import json
          import re

          required_files = [
              "README.md",
              "MIRROR_SOURCE.json",
              "STATUS.json",
              "CLAIMS_BOUNDARY.md",
              "MIRROR_SYNC_POLICY.md",
              "MIRROR_REPRODUCIBILITY_AND_VERIFICATION.md",
              "VERIFICATION.md",
              "NO_GPG_SIGNATURES_YET.md",
              "RELEASE_NOTES.md",
              "REPRODUCIBLE_RELEASE.md",
              "SECURITY.md",
          ]

          for name in required_files:
              path = Path(name)
              if not path.exists():
                  raise SystemExit(f"missing required file: {name}")
              path.read_text(encoding="utf-8")

          source = json.loads(
              Path("MIRROR_SOURCE.json").read_text(encoding="utf-8")
          )
          status = json.loads(
              Path("STATUS.json").read_text(encoding="utf-8")
          )

          allowed_statuses = {
              "STAGING_NOT_ACTIVATED",
              "VERIFIED_NOT_ACTIVATED",
              "ACTIVATED",
          }

          source_status = source.get("mirror_status")
          status_status = status.get("status")

          if source_status not in allowed_statuses:
              raise SystemExit(
                  f"invalid MIRROR_SOURCE status: {source_status}"
              )
          if status_status not in allowed_statuses:
              raise SystemExit(
                  f"invalid STATUS status: {status_status}"
              )
          if source_status != status_status:
              raise SystemExit(
                  "MIRROR_SOURCE.json and STATUS.json status mismatch"
              )

          if status.get("canonical_release_created_here") is not False:
              raise SystemExit(
                  "founder mirror cannot declare canonical release authority"
              )

          repo_pattern = re.compile(
              r"^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
          )
          for key in (
              "mirror_repository",
              "canonical_repository",
              "release_repository",
          ):
              value = source.get(key)
              if not isinstance(value, str) or not repo_pattern.fullmatch(value):
                  raise SystemExit(f"invalid repository identifier: {key}")

          def valid_hex(value, lengths):
              return (
                  isinstance(value, str)
                  and len(value) in lengths
                  and re.fullmatch(r"[0-9a-fA-F]+", value) is not None
              )

          def valid_utc(value):
              if not isinstance(value, str) or not value.endswith("Z"):
                  return False
              try:
                  datetime.fromisoformat(value.replace("Z", "+00:00"))
                  return True
              except ValueError:
                  return False

          required_upstream = [
              "source_commit",
              "release_tag",
              "release_manifest_sha256",
              "signer_fingerprint",
              "provenance_reference",
              "verified_at_utc",
              "verified_by",
          ]

          non_staging = source_status != "STAGING_NOT_ACTIVATED"
          if non_staging:
              missing = [
                  key for key in required_upstream
                  if not source.get(key)
              ]
              if missing:
                  raise SystemExit(
                      f"non-staging mirror has unresolved fields: {missing}"
                  )

              if not valid_hex(source["source_commit"], {40, 64}):
                  raise SystemExit("invalid source_commit")
              if not valid_hex(
                  source["release_manifest_sha256"], {64}
              ):
                  raise SystemExit("invalid release_manifest_sha256")
              if not valid_hex(
                  source["signer_fingerprint"], {40, 64}
              ):
                  raise SystemExit("invalid signer_fingerprint")
              if not valid_utc(source["verified_at_utc"]):
                  raise SystemExit("invalid verified_at_utc")

          verification_flags = (
              "signature_verified",
              "source_commit_verified",
              "byte_parity_verified",
          )

          if source_status in {
              "VERIFIED_NOT_ACTIVATED",
              "ACTIVATED",
          }:
              false_flags = [
                  key for key in verification_flags
                  if status.get(key) is not True
              ]
              if false_flags:
                  raise SystemExit(
                      f"verified/activated status has false flags: "
                      f"{false_flags}"
                  )

          field_to_flag = {
              "source_commit": "source_commit_verified",
              "release_manifest_sha256": "signature_verified",
          }
          for field, flag in field_to_flag.items():
              if not source.get(field) and status.get(flag) is True:
                  raise SystemExit(
                      f"{flag}=true while {field} is unresolved"
                  )

          governed_extensions = {
              ".md", ".json", ".yml", ".yaml", ".txt"
          }
          governed_files = [
              p for p in Path(".").rglob("*")
              if p.is_file()
              and ".git" not in p.parts
              and p.suffix.lower() in governed_extensions
          ]

          forbidden_claims = [
              "scientifically proven platform",
              "fully verified regenerative infrastructure",
              "production ready",
              "regulator approved",
              "regulatory approved",
              "institutionally admitted",
              "investment grade",
              "canonical release activated",
              "independently replicated",
              "guaranteed ecological outcome",
              "guaranteed financial outcome",
              "guaranteed health outcome",
          ]

          bidi = re.compile(
              "[\u200e\u200f\u202a-\u202e\u2066-\u2069]"
          )

          violations = []
          for path in governed_files:
              text = path.read_text(encoding="utf-8")
              lowered = text.lower()

              for phrase in forbidden_claims:
                  if phrase in lowered:
                      violations.append(
                          f"{path}: prohibited claim: {phrase}"
                      )

              for match in bidi.finditer(text):
                  violations.append(
                      f"{path}: prohibited bidi control "
                      f"U+{ord(match.group()):04X}"
                  )

          if violations:
              raise SystemExit("\n".join(violations))

          print("mirror governance and text-safety verification passed")
          PY

      - name: Enforce canonical artifact admission gate
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          changed="$(
            git diff --name-only "$BASE_SHA" "$HEAD_SHA"
          )"

          if ! printf '%s\n' "$changed" | grep -q '^canonical/'; then
            echo "No canonical/ changes detected."
            exit 0
          fi

          test -f CANONICAL_ADMISSION.json

          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          import json
          import re

          record = json.loads(
              Path("CANONICAL_ADMISSION.json").read_text(
                  encoding="utf-8"
              )
          )

          required = [
              "canonical_repository",
              "release_repository",
              "source_commit",
              "release_tag",
              "release_manifest_sha256",
              "signer_fingerprint",
              "provenance_reference",
              "admitted_by",
              "admitted_at_utc",
          ]

          missing = [key for key in required if not record.get(key)]
          if missing:
              raise SystemExit(
                  f"canonical admission record is incomplete: {missing}"
              )

          if record.get("byte_parity_verified") is not True:
              raise SystemExit("byte_parity_verified must be true")
          if record.get("signature_verified") is not True:
              raise SystemExit("signature_verified must be true")

          if not re.fullmatch(
              r"[0-9a-fA-F]{40}|[0-9a-fA-F]{64}",
              record["source_commit"],
          ):
              raise SystemExit("invalid admission source_commit")

          if not re.fullmatch(
              r"[0-9a-fA-F]{64}",
              record["release_manifest_sha256"],
          ):
              raise SystemExit("invalid admission manifest hash")

          try:
              datetime.fromisoformat(
                  record["admitted_at_utc"].replace("Z", "+00:00")
              )
          except ValueError as exc:
              raise SystemExit(
                  "invalid admission timestamp"
              ) from exc

          print("canonical artifact admission gate passed")
          PY
